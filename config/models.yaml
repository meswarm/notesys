# config/models.yaml
# notesys v0.3.0 — 仅保留三个流水线步骤的模型配置

models:
  # 步骤 1：图像语义提取（qwen3-vl-flash，视觉理解模型）
  image_semantic:
    provider: "dashscope"
    model: "qwen3-vl-flash"
    temperature: 0.3
    max_tokens: 2000
    enable_thinking: false

  # 步骤 2：笔记内容整理（qwen3.5-plus，最强改写能力）
  note_organizer:
    provider: "dashscope"
    model: "qwen3.5-plus"
    temperature: 0.7
    max_tokens: 16384
    enable_thinking: true

  # 步骤 3：笔记分类（qwen3.5-flash，轻量快速）
  note_classifier:
    provider: "dashscope"
    model: "qwen3.5-flash"
    temperature: 0.1
    max_tokens: 500
    enable_thinking: false

# 服务端默认笔记存储目录（可被 API 请求中的 notes_root_path 覆盖）
note_storage:
  root_path: "./notes"

# 流水线步骤默认开关（可被 API 请求参数逐次覆盖）
organize:
  enable_image_semantic: true   # 图像语义提取（VL 模型调用）
  enable_note_format: true      # 笔记内容整理（LLM 调用）
  enable_classify_and_save: true # 分类 + 保存（LLM 调用 + 文件写入）
