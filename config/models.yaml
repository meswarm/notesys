# config/models.yaml
models:
  image_semantic:
    provider: "dashscope"
    model: "qwen3-vl-flash"
    temperature: 0.3
    max_tokens: 2000
    enable_thinking: false

  note_organizer:
    provider: "dashscope"
    model: "qwen3.5-plus"
    temperature: 0.7
    max_tokens: 8192
    enable_thinking: true

  note_classifier:
    provider: "dashscope"
    model: "qwen3.5-flash"
    temperature: 0.1
    max_tokens: 500
    enable_thinking: false

  embedding:
    provider: "dashscope"
    model: "text-embedding-v4"
    dimension: 1024
    output_type: "dense&sparse"
    batch_size: 10
    max_tokens_per_text: 8192

  query_rewriter:
    provider: "dashscope"
    model: "qwen3.5-flash"
    temperature: 0.3
    max_tokens: 500
    enable_thinking: false

  query_synthesizer:
    provider: "dashscope"
    model: "qwen3.5-plus"
    temperature: 0.5
    max_tokens: 4096
    enable_thinking: false

qdrant:
  host: "localhost"
  port: 6333
  grpc_port: 6334
  collection: "notes"

note_storage:
  root_path: "./notes"
  max_directory_depth: 2

chunking:
  max_chunk_tokens: 500
  overlap_tokens: 50
